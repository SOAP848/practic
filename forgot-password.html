<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Hungry People</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page">

    <div class="forgot-page">
        <h1 class="forgot-page__title">Hungry people</h1>

        <div class="forgot-page__card">
            <h2 class="forgot-page__heading">Forgot Password</h2>

            <form class="forgot-page__form" id="forgotForm">
                <div class="forgot-page__input-wrap">
                    <input class="forgot-page__input" type="email" name="email" placeholder="Email" required>
                    <span class="forgot-page__input-icon">&#9993;</span>
                </div>

                <div class="forgot-page__actions">
                    <a class="forgot-page__link" href="index.html">Login</a>
                    <button class="forgot-page__btn" type="submit">Submit</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
